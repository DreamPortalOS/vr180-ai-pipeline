version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/data
    command: >
      uvicorn web.app:app
      --host 0.0.0.0
      --port 8000
      --reload

  worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/data
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=1

volumes:
  redis_data:
  upload_data: