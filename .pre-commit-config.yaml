# Setup (REQUIRED per clone — without this, hooks do NOT run):
#   pip install pre-commit
#   pre-commit install --hook-type pre-commit --hook-type pre-push
# Run all: pre-commit run --all-files
#
# IMPORTANT: ruff rev MUST match CI (.github/workflows/ci.yml installs latest ruff)
# and the local venv. A version mismatch is why lint can pass locally but fail in CI.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']

  # NOTE: pytest is intentionally NOT a pre-push hook.
  # `language: system` ran `python` from whatever shell did the push, which is
  # often NOT the project venv → missing deps → false-positive failures that
  # block pushes. The full test suite runs in CI (.github/workflows/ci.yml),
  # which is the authoritative gate. Run tests locally with: pytest tests/ -q